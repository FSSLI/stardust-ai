version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.backend
    container_name: stardust-backend
    volumes:
      - ./data:/app/data
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DATABASE_URL=sqlite:///app/data/stardust.db
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-stardust-jwt-production}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.frontend
    container_name: stardust-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
